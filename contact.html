<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - GroupLeft</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contact-container">
        <!-- Left Side: Contact Info -->
        <div class="contact-info">
            <h2>Get in Touch</h2>
            <p>Have questions or want to collaborate? Drop us a message and we will get back to you as soon as possible.</p>
            
            <div class="info-details">
                <div class="info-item">
                    <strong>📍 Location:</strong>
                    <span>123 Tech Street, Suite 500, San Francisco, CA</span>
                </div>
                <div class="info-item">
                    <strong>📧 Email:</strong>
                    <span>support@groupleft.com</span>
                </div>
                <div class="info-item">
                    <strong>📞 Phone:</strong>
                    <span>+1 (555) 019-2834</span>
                </div>
            </div>
        </div>

        <!-- Right Side: Contact Form -->
        <div class="contact-form-container">
            <h2>Send a Message</h2>
            <form class="contact-form" action="#" method="POST">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="john@example.com">
                </div>
                
                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" rows="5" required placeholder="How can we help you?"></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </div>

</body>
</html>
